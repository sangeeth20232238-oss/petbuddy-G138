<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>PetBuddy — Clinic Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #FFF5F0; color: #333; }

        header {
            background: #FF741C; color: white;
            padding: 18px 30px;
            display: flex; align-items: center; justify-content: space-between;
        }
        header h1 { font-size: 22px; }
        header span { font-size: 14px; opacity: 0.85; }

        .login-wrap {
            max-width: 400px; margin: 80px auto;
            background: white; border-radius: 16px;
            padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .login-wrap h2 { margin-bottom: 24px; color: #FF741C; }
        input {
            width: 100%; padding: 12px 16px; margin-bottom: 16px;
            border: 1px solid #ddd; border-radius: 10px; font-size: 15px;
        }
        button {
            width: 100%; padding: 14px;
            background: #FF741C; color: white;
            border: none; border-radius: 10px;
            font-size: 16px; cursor: pointer;
        }
        button:hover { background: #e5651a; }
        .error { color: red; font-size: 13px; margin-top: 10px; }

        .dashboard { padding: 30px; display: none; }
        .dashboard h2 { margin-bottom: 20px; font-size: 20px; }

        .filters { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
        .filter-btn {
            padding: 8px 20px; border-radius: 20px;
            border: 2px solid #FF741C; background: white;
            color: #FF741C; cursor: pointer; font-size: 14px; width: auto;
        }
        .filter-btn.active { background: #FF741C; color: white; }

        .bookings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: white; border-radius: 16px;
            padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            border-left: 5px solid #ccc;
        }
        .card.pending  { border-left-color: #FFA500; }
        .card.confirmed { border-left-color: #4CAF50; }
        .card.rejected  { border-left-color: #F44336; }

        .card h3 { font-size: 16px; margin-bottom: 6px; }
        .card p  { font-size: 13px; color: #666; margin-bottom: 4px; }

        .badge {
            display: inline-block; padding: 3px 12px;
            border-radius: 20px; font-size: 12px; font-weight: bold;
            margin: 10px 0;
        }
        .badge.pending   { background: #FFF3CD; color: #856404; }
        .badge.confirmed { background: #D4EDDA; color: #155724; }
        .badge.rejected  { background: #F8D7DA; color: #721C24; }

        .actions { display: flex; gap: 10px; margin-top: 14px; }
        .btn-confirm {
            flex: 1; padding: 10px; background: #4CAF50;
            color: white; border: none; border-radius: 8px; cursor: pointer; width: auto;
        }
        .btn-reject {
            flex: 1; padding: 10px; background: #F44336;
            color: white; border: none; border-radius: 8px; cursor: pointer; width: auto;
        }
        .btn-confirm:disabled, .btn-reject:disabled { opacity: 0.4; cursor: default; }

        .empty { text-align: center; color: #aaa; margin-top: 60px; font-size: 16px; }
        .logout-btn {
            background: transparent; border: 2px solid white;
            color: white; padding: 8px 18px; border-radius: 8px;
            cursor: pointer; font-size: 14px; width: auto;
        }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
    <header><h1>🐾 PetBuddy Clinic Portal</h1></header>
    <div class="login-wrap">
        <h2>Clinic Login</h2>
        <input type="email" id="emailInput" placeholder="clinic@email.com" />
        <input type="password" id="passwordInput" placeholder="Password" />
        <button onclick="handleLogin()">Login</button>
        <p class="error" id="loginError"></p>
    </div>
</div>

<!-- DASHBOARD SCREEN -->
<div id="dashboardScreen">
    <header>
        <h1>🐾 PetBuddy — Clinic Dashboard</h1>
        <div style="display:flex; align-items:center; gap:16px;">
            <span id="clinicEmail"></span>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>
    </header>
    <div class="dashboard" id="dashboard">
        <h2>Appointments</h2>
        <div class="filters">
            <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
            <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
            <button class="filter-btn" onclick="setFilter('confirmed', this)">Confirmed</button>
            <button class="filter-btn" onclick="setFilter('rejected', this)">Rejected</button>
        </div>
        <div class="bookings-grid" id="bookingsGrid"></div>
        <p class="empty" id="emptyMsg" style="display:none;">No bookings found.</p>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import {
        getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
    import {
        getFirestore, collection, onSnapshot, doc, updateDoc, query, where
    } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    // ── Same Firebase project as your mobile app ──
    const firebaseConfig = {
        apiKey: "AIzaSyBI2pHqIKd_Uz0Rb3xJ2YH_IzhkKb7aRbM",
        authDomain: "petbuddy-138.firebaseapp.com",
        projectId: "petbuddy-138",
        storageBucket: "petbuddy-138.firebasestorage.app",
        messagingSenderId: "506859726227",
        appId: "1:506859726227:web:9083b07cceca26b8b6b466"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let allBookings = [];
    let currentFilter = 'all';
    let unsubscribeBookings = null;

    // ── Auth state ──
    onAuthStateChanged(auth, user => {
        if (user) {
            document.getElementById('loginScreen').style.display    = 'none';
            document.getElementById('dashboardScreen').style.display = 'block';
            document.getElementById('dashboard').style.display       = 'block';
            document.getElementById('clinicEmail').textContent       = user.email;
            listenToBookings(user.email);
        } else {
            document.getElementById('loginScreen').style.display     = 'block';
            document.getElementById('dashboardScreen').style.display = 'none';
            if (unsubscribeBookings) unsubscribeBookings();
        }
    });

    // ── Login ──
    window.handleLogin = async () => {
        const email    = document.getElementById('emailInput').value.trim();
        const password = document.getElementById('passwordInput').value;
        document.getElementById('loginError').textContent = '';
        try {
            await signInWithEmailAndPassword(auth, email, password);
        } catch (e) {
            document.getElementById('loginError').textContent = 'Invalid email or password.';
        }
    };

    // ── Logout ──
    window.handleLogout = () => signOut(auth);

    // ── Real-time bookings listener ──
    // Clinics see bookings where clinicName matches their email prefix,
    // OR you can filter by a clinicId field once you set that up.
    function listenToBookings(email) {
        const q = collection(db, 'bookings');
        unsubscribeBookings = onSnapshot(q, snapshot => {
            allBookings = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            renderBookings();
        });
    }

    // ── Filter ──
    window.setFilter = (filter, btn) => {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderBookings();
    };

    // ── Render ──
    function renderBookings() {
        const grid = document.getElementById('bookingsGrid');
        const empty = document.getElementById('emptyMsg');
        const filtered = currentFilter === 'all'
            ? allBookings
            : allBookings.filter(b => b.status === currentFilter);

        if (filtered.length === 0) {
            grid.innerHTML = '';
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';

        // Sort newest first
        filtered.sort((a, b) => {
            const ta = a.createdAt?.seconds || 0;
            const tb = b.createdAt?.seconds || 0;
            return tb - ta;
        });

        grid.innerHTML = filtered.map(b => `
            <div class="card ${b.status}">
                <h3>👤 Patient ID: ${b.userId.slice(0, 8)}...</h3>
                <p>🏥 Clinic: ${b.clinicName || '—'}</p>
                <p>👨‍⚕️ Doctor: ${b.doctorName || '—'}</p>
                <p>📅 Date: ${b.date || '—'}</p>
                <p>🕐 Time: ${b.timeSlot || '—'}</p>
                <span class="badge ${b.status}">${b.status.toUpperCase()}</span>
                <div class="actions">
                    <button class="btn-confirm"
                        ${b.status !== 'pending' ? 'disabled' : ''}
                        onclick="updateStatus('${b.id}', 'confirmed')">
                        ✅ Confirm
                    </button>
                    <button class="btn-reject"
                        ${b.status !== 'pending' ? 'disabled' : ''}
                        onclick="updateStatus('${b.id}', 'rejected')">
                        ❌ Reject
                    </button>
                </div>
            </div>
        `).join('');
    }

    // ── Update booking status ──
    window.updateStatus = async (bookingId, newStatus) => {
        await updateDoc(doc(db, 'bookings', bookingId), { status: newStatus });
    };
</script>
</body>
</html>
