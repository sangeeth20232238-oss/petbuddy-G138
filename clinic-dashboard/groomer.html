<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>PetBuddy — Groomer Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #FFF5F0; color: #333; }
        header {
            background: #FF741C; color: white;
            padding: 18px 30px;
            display: flex; align-items: center; justify-content: space-between;
        }
        header h1 { font-size: 22px; }
        .logout-btn {
            background: transparent; border: 2px solid white;
            color: white; padding: 8px 18px; border-radius: 8px;
            cursor: pointer; font-size: 14px;
        }
        .dashboard { padding: 30px; max-width: 1000px; margin: 0 auto; }
        .dashboard h2 { margin-bottom: 20px; font-size: 24px; color: #FF741C; }
        .filters { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
        .filter-btn {
            padding: 8px 20px; border-radius: 20px;
            border: 2px solid #FF741C; background: white;
            color: #FF741C; cursor: pointer; font-size: 14px;
            transition: all 0.3s ease;
        }
        .filter-btn.active { background: #FF741C; color: white; }
        .bookings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background: white; border-radius: 16px;
            padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-left: 5px solid #ccc;
        }
        .card.pending   { border-left-color: #FFA500; }
        .card.confirmed { border-left-color: #4CAF50; }
        .card.rejected  { border-left-color: #F44336; }
        .card h3 { font-size: 18px; margin-bottom: 8px; }
        .card p  { font-size: 14px; color: #666; margin-bottom: 5px; }
        .badge {
            display: inline-block; padding: 4px 12px;
            border-radius: 20px; font-size: 12px; font-weight: bold; margin: 12px 0;
        }
        .badge.pending   { background: #FFF3CD; color: #856404; }
        .badge.confirmed { background: #D4EDDA; color: #155724; }
        .badge.rejected  { background: #F8D7DA; color: #721C24; }
        .actions { display: flex; gap: 10px; margin-top: 14px; }
        .btn-confirm {
            flex: 1; padding: 10px; background: #4CAF50;
            color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .btn-reject {
            flex: 1; padding: 10px; background: #F44336;
            color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .btn-confirm:disabled, .btn-reject:disabled { opacity: 0.4; cursor: not-allowed; }
        .empty { text-align: center; color: #aaa; margin-top: 60px; font-size: 16px; }
    </style>
</head>
<body>

<header>
    <h1>✂️ PetBuddy — Groomer Dashboard</h1>
    <div style="display:flex; align-items:center; gap:16px;">
        <span id="groomerEmail"></span>
        <button class="logout-btn" onclick="handleLogout()">Logout</button>
    </div>
</header>

<div class="dashboard">
    <h2>Grooming Appointments</h2>
    <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
        <button class="filter-btn" onclick="setFilter('confirmed', this)">Confirmed</button>
        <button class="filter-btn" onclick="setFilter('rejected', this)">Rejected</button>
    </div>
    <div class="bookings-grid" id="bookingsGrid"></div>
    <p class="empty" id="emptyMsg" style="display:none;">No bookings found.</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBI2pHqIKd_Uz0Rb3xJ2YH_IzhkKb7aRbM",
        authDomain: "petbuddy-138.firebaseapp.com",
        projectId: "petbuddy-138",
        storageBucket: "petbuddy-138.firebasestorage.app",
        messagingSenderId: "506859726227",
        appId: "1:506859726227:web:9083b07cceca26b8b6b466"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let allBookings = [];
    let currentFilter = 'all';

    onAuthStateChanged(auth, async user => {
        if (!user) {
            window.location.href = 'index.html';
            return;
        }
        const roleDoc = await getDoc(doc(db, 'adminRoles', user.uid));
        if (!roleDoc.exists() || roleDoc.data().role !== 'groomer') {
            await signOut(auth);
            window.location.href = 'index.html';
            return;
        }
        document.getElementById('groomerEmail').textContent = user.email;
        listenToBookings();
    });

    window.handleLogout = async () => {
        await signOut(auth);
        window.location.href = 'index.html';
    };

    function listenToBookings() {
        onSnapshot(collection(db, 'groomingBookings'), snapshot => {
            allBookings = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            renderBookings();
        });
    }

    window.setFilter = (filter, btn) => {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderBookings();
    };

    function renderBookings() {
        const grid = document.getElementById('bookingsGrid');
        const empty = document.getElementById('emptyMsg');
        const filtered = currentFilter === 'all'
            ? allBookings
            : allBookings.filter(b => b.status === currentFilter);

        if (filtered.length === 0) {
            grid.innerHTML = '';
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';

        filtered.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

        grid.innerHTML = filtered.map(b => `
            <div class="card ${b.status}">
                <h3>👤 ${b.userName || 'Customer'}</h3>
                <p>✂️ Service: ${b.service || '—'}</p>
                <p>🐾 Pet: ${b.petName || '—'}</p>
                <p>📅 Date: ${b.date || '—'}</p>
                <p>🕐 Time: ${b.timeSlot || '—'}</p>
                <span class="badge ${b.status}">${b.status.toUpperCase()}</span>
                <div class="actions">
                    <button class="btn-confirm"
                        ${b.status !== 'pending' ? 'disabled' : ''}
                        onclick="updateStatus('${b.id}', 'confirmed')">✅ Confirm</button>
                    <button class="btn-reject"
                        ${b.status !== 'pending' ? 'disabled' : ''}
                        onclick="updateStatus('${b.id}', 'rejected')">❌ Reject</button>
                </div>
            </div>
        `).join('');
    }

    window.updateStatus = async (bookingId, newStatus) => {
        try {
            await updateDoc(doc(db, 'groomingBookings', bookingId), { status: newStatus });
        } catch (e) {
            alert('Error updating status: ' + e.message);
        }
    };
</script>
</body>
</html>
